name: Deploy to VPS

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
  workflow_dispatch:

env:
  BACKEND_PORT: 8050
  FRONTEND_PORT: 3050
  DEPLOY_PATH: /root/use-cases/sow-master

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 20m
          script: |
            DEPLOY_PATH="/root/use-cases/sow-master"
            REPO="https://github.com/babathakur855/sow-master.git"

            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              echo "==> First deploy: cloning repo..."
              mkdir -p "$DEPLOY_PATH"
              git clone "$REPO" "$DEPLOY_PATH"
            fi

            cd "$DEPLOY_PATH"
            echo "==> Pulling latest code..."
            git pull origin main

            if [ ! -f .env ] && [ -f /root/use-cases/.env.common ]; then
              echo "==> Copying shared .env.common..."
              cp /root/use-cases/.env.common .env
            fi

            echo "==> Rebuilding containers..."
            if [ -f docker-compose.yml ]; then
              docker compose build --no-cache
              docker compose up -d
              docker image prune -f

              echo "==> Health check..."
              sleep 10
              docker compose ps
              curl -sf http://localhost:8050/health && echo "Backend: OK" || echo "Backend: not yet available"
              curl -sf http://localhost:3050 > /dev/null && echo "Frontend: OK" || echo "Frontend: not yet available"
            else
              echo "==> No docker-compose.yml yet — skipping container build"
            fi

            echo ""
            echo "================================================"
            echo "  DEPLOYED: sow-master"
            echo "  Frontend: http://${{ secrets.VPS_HOST }}:3050"
            echo "  Backend:  http://${{ secrets.VPS_HOST }}:8050"
            echo "================================================"

  summary:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Write job summary
        run: |
          echo "## sow-master Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | \`${{ needs.deploy.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | \`http://VPS:3050\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend  | \`http://VPS:8050\` |" >> $GITHUB_STEP_SUMMARY
